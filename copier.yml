# copier.yml — bailiff-mod-precommit
#
# Selecting this module IS choosing pre-commit as the hook manager.
# Language modules that contribute hooks write .pre-commit.d/<vendor>-<module>.yaml
# fragments; this module ships _merge_precommit.py (template content) as a _post_task
# that reads all fragments after the full render loop and emits .pre-commit-config.yaml.
#
# Fragment/merge model (spec 014 _fragment-merge.md Surface 2):
# - Each hook-contributing module writes .pre-commit.d/<vendor>-<module>.yaml
# - This module ships _merge_precommit.py (template content) as a _post_task
#   that reads all fragments after the full render loop and emits .pre-commit-config.yaml
# - hook_blocks union REMOVED
#
# Contract: ships template/{{ _copier_conf.answers_file }}.jinja; NO secret:
# questions; ordering edges are when:false hidden answers (Constitution VI).

# --- Dependency ordering (spec 014 R7/R8) ------------------------------------
# phase: normal (base=pre, family=normal)
_bailiff_phase: normal

# --- Optional feature flags --------------------------------------------------

enforce_conventional_commits:
  type: bool
  default: true
  help: "Add a commit-msg hook that enforces Conventional Commits via close-keywords."

enable_typo_check:
  type: bool
  default: true
  help: "Add a typo-check hook (crate-ci/typos via pre-commit)."

# De-hardwires the old SpecKit exclude patterns: previously locked to a fixed
# list; now caller-supplied so no single set is baked in.
precommit_exclude_patterns:
  type: yaml
  default: []
  help: "Extra exclude patterns injected into .pre-commit-config.yaml (yaml list). bailiff injects this."

# When true (default) the install task runs once on init.
install_hooks:
  type: bool
  default: true
  help: "Run 'pre-commit install' after rendering (init-only-guarded)."

# Threaded from base (FR-010 pattern); standalone fallback is empty string.
today:
  type: str
  default: ""
  help: "The generation date (YYYY-MM-DD); bailiff injects this — leave blank."

# --- Dependency ordering edges (when:false hidden answers) -------------------

depends_on:
  type: yaml
  default:
    - bailiff-mod-base
  when: false

# Template body lives under template/ — copier renders only that subtree.
_subdirectory: template

# --- Post-tasks: fragment bundler (spec 014 FR-021/R11) ----------------------
# Runs AFTER the full render loop so all .pre-commit.d/*.yaml fragments exist.
# The script is inert when no .pre-commit.d/*.yaml fragments exist.
_post_tasks:
  - "python3 scripts/_merge_precommit.py"

# --- Trust-gated tasks (FR-007b / FR-012a) -----------------------------------
# The install task is init-only-guarded: we write a committed sentinel
# (.bailiff-precommit-installed) on first run; the `test -f` guard makes reproduce
# a no-op so we never double-install.
_tasks:
  # pre-commit install (guarded: only when install_hooks=true)
  - command: >-
      test -f .bailiff-precommit-installed ||
      { pre-commit install && touch .bailiff-precommit-installed; }
    when: "{{ install_hooks }}"
